name: felicash
description: The AI-Powered Money Tracker Application
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  app_ui:
    path: packages/app_ui
  app_utils:
    path: packages/app_utils
  authentication_client:
    path: packages/authentication_client/authentication_client
  bloc: ^9.0.0
  equatable: ^2.0.7
  firebase_core: ^3.12.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_localizations:
    sdk: flutter
  formz: ^0.8.0
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.3.0
  intl: ^0.19.0
  supabase_authentication_client:
    path: packages/authentication_client/supabase_authentication_client
  supabase_flutter: ^2.8.4
  token_storage:
    path: packages/authentication_client/token_storage
  user_repository:
    path: packages/user_repository

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true
